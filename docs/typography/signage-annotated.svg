<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#f7f8fb"/>
  <text x="48" y="56" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#000080">Logo Labels &amp; Signage Typography (Annotated)</text>

  <rect x="48" y="92" width="730" height="500" rx="14" fill="#ffffff" stroke="#d9deeb"/>
  <text x="72" y="136" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Approved Font Family</text>
  <text x="72" y="168" font-family="Consolas, monospace" font-size="18" fill="#1f2937">font-family: "Microsoft Tai Le", "Microsoft New Tai Lue", sans-serif;</text>

  <rect x="72" y="205" width="670" height="120" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="94" y="254" font-family="Microsoft Tai Le, Microsoft New Tai Lue, Arial, sans-serif" font-size="32" fill="#111827">PLREI EQUIPMENT TAG</text>
  <text x="94" y="290" font-family="Microsoft Tai Le, Microsoft New Tai Lue, Arial, sans-serif" font-size="20" fill="#374151">AUTHORIZED SERVICE LABEL</text>

  <rect x="72" y="348" width="670" height="100" rx="10" fill="#fff7ed" stroke="#f59e0b"/>
  <text x="94" y="387" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#9a3412">Rule:</text>
  <text x="150" y="387" font-family="Arial, sans-serif" font-size="18" fill="#7c2d12">Do not mix signage text with body-copy stacks such as Aptos/Calibri.</text>
  <text x="94" y="417" font-family="Arial, sans-serif" font-size="16" fill="#7c2d12">Signage must remain distinct and operationally consistent.</text>

  <rect x="72" y="470" width="300" height="92" rx="10" fill="#ecfdf5" stroke="#16a34a"/>
  <text x="92" y="505" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#166534">DO</text>
  <text x="92" y="534" font-family="Arial, sans-serif" font-size="16" fill="#166534">Use Microsoft Tai Le family.</text>

  <rect x="392" y="470" width="340" height="92" rx="10" fill="#fef2f2" stroke="#dc2626"/>
  <text x="412" y="505" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#991b1b">DON'T</text>
  <text x="412" y="534" font-family="Arial, sans-serif" font-size="16" fill="#991b1b">Mix with body-copy font stacks.</text>

  <line x1="860" y1="252" x2="760" y2="252" stroke="#000080" stroke-width="2"/>
  <text x="875" y="248" font-family="Arial, sans-serif" font-size="16" fill="#000080">Annotation A:</text>
  <text x="875" y="270" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">Use Tai Le for labels,</text>
  <text x="875" y="290" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">tags, and signage copy.</text>

  <line x1="860" y1="385" x2="760" y2="385" stroke="#000080" stroke-width="2"/>
  <text x="875" y="381" font-family="Arial, sans-serif" font-size="16" fill="#000080">Annotation B:</text>
  <text x="875" y="403" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">Keep signage typography</text>
  <text x="875" y="423" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">separate from UI/body text.</text>
</svg>
