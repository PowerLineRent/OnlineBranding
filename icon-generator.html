<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Icon Generator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; background: #f4f4f4; }
        h1 { color: #000080; font-size: 18px; }
        .icons { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px; }
        .icon-card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 16px; text-align: center; }
        canvas { display: block; margin: 0 auto 10px; }
        .icon-card p { font-size: 12px; color: #555; margin: 0 0 8px; }
        a.dl { display: inline-block; background: #000080; color: #fff; padding: 6px 14px; border-radius: 4px; font-size: 12px; text-decoration: none; }
        a.dl:hover { background: #0000aa; }
    </style>
</head>
<body>
    <h1>PLREI Icon Generator</h1>
    <p style="font-size:13px; color:#666;">Icons with navy background, ready to upload to GitHub.</p>
    <div class="icons" id="icons"></div>

    <script>
        const SIZE = 20;
        const BG = '#000080';

        const icons = [
            { name: 'icon-phone',   src: 'https://cdn2.hubspot.net/hubfs/53/tools/email-signature-generator/icons/phone-icon-dark-2x.png' },
            { name: 'icon-email',   src: 'https://cdn2.hubspot.net/hubfs/53/tools/email-signature-generator/icons/email-icon-dark-2x.png' },
            { name: 'icon-link',    src: 'https://cdn2.hubspot.net/hubfs/53/tools/email-signature-generator/icons/link-icon-dark-2x.png' },
            { name: 'icon-address', src: 'https://cdn2.hubspot.net/hubfs/53/tools/email-signature-generator/icons/address-icon-dark-2x.png' },
        ];

        const container = document.getElementById('icons');

        icons.forEach(({ name, src }) => {
            const card = document.createElement('div');
            card.className = 'icon-card';

            const canvas = document.createElement('canvas');
            canvas.width = SIZE;
            canvas.height = SIZE;

            const label = document.createElement('p');
            label.textContent = name + '.webp';

            const link = document.createElement('a');
            link.className = 'dl';
            link.textContent = 'Download';

            card.appendChild(canvas);
            card.appendChild(label);
            card.appendChild(link);
            container.appendChild(card);

            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                ctx.fillStyle = BG;
                ctx.fillRect(0, 0, SIZE, SIZE);
                ctx.drawImage(img, 0, 0, SIZE, SIZE);
                const dataUrl = canvas.toDataURL('image/webp', 1.0);
                link.href = dataUrl;
                link.download = name + '.webp';
            };
            img.onerror = () => {
                ctx.fillStyle = BG;
                ctx.fillRect(0, 0, SIZE, SIZE);
                label.textContent += ' (load error — see note below)';
            };
            img.src = src;
        });
    </script>

    <p style="margin-top:30px; font-size:12px; color:#999;">
        Note: if icons show a load error, open this file via a local server (e.g. VS Code Live Server)
        instead of file:// — CORS blocks cross-origin images on file:// URLs.
    </p>
</body>
</html>
