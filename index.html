<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PLREI Online Branding</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            color: #111;
            background: linear-gradient(160deg, #e8ecff 0%, #f5f7ff 35%, #ffffff 100%);
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 700px;
            background: #fff;
            border: 1px solid #d5dbf5;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 16px 40px rgba(0, 0, 60, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            color: #000080;
            font-size: 28px;
            line-height: 1.2;
        }

        p {
            margin: 0 0 20px;
            color: #4a4a63;
            line-height: 1.5;
        }

        a.tool-link {
            display: inline-block;
            text-decoration: none;
            background: #000080;
            color: #fff;
            border-radius: 8px;
            padding: 12px 20px;
            font-weight: 700;
            transition: background 0.15s;
        }

        a.tool-link:hover {
            background: #0000aa;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>PLREI Online Branding Tools</h1>
        <p>Use the tool below to generate and share a personalized PLREI email signature.</p>
        <a class="tool-link" href="/EmailSignature">Open Email Signature Generator</a>
    </main>
</body>
</html>
